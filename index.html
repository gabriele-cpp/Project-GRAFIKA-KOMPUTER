<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Simulator — Hybrid Spatial-Occlusion Culling</title>
    <link rel="stylesheet" href="style.css">
    <!-- Import map: resolve bare 'three' specifier untuk GLTFLoader/OBJLoader internal imports -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
    </script>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- Scanline HUD overlay -->
<div id="hud-overlay"></div>

<!-- FPS COUNTER (top-left, offset for panel toggle) -->
<div id="fps-panel" style="left: 36px;">
    <div class="fps-value" id="stat-fps">0</div>
    <div class="fps-label">FPS</div>
</div>

<!-- STATS BAR (top-center) -->
<div id="stats-panel">
    <div class="stat-block">
        <span class="val" id="stat-rendered">0</span>
        <span class="lbl">Rendered</span>
    </div>
    <div class="stat-block">
        <span class="val" id="stat-total">0</span>
        <span class="lbl">Total</span>
    </div>
    <div class="stat-block">
        <span class="val" id="stat-culled" style="color: var(--yellow)">0</span>
        <span class="lbl">Culled</span>
    </div>
    <div class="stat-block">
        <span class="val" id="stat-eff" style="color: var(--green)">0%</span>
        <span class="lbl">Efficiency</span>
    </div>
</div>

<!-- Right control panel dihapus — semua kontrol dipindah ke Left Panel -->
<!-- Hidden fallback elements agar referensi ID di main.js tidak error -->
<div style="display:none">
  <input type="checkbox" id="toggleFrustum" checked>
  <input type="checkbox" id="toggleOctree" checked>
  <input type="checkbox" id="toggleOcclusion">
  <input type="checkbox" id="toggleLOD">
  <input type="checkbox" id="toggleBBox">
  <input type="checkbox" id="toggleLODColor">
  <input type="range"    id="obj-slider" min="1" max="50000" step="1" value="500">
  <span id="obj-count-display"></span>
  <select id="sel-mode"><option value="random">Random</option><option value="clustered">Clustered</option></select>
  <select id="sel-palette"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
  <button id="btn-generate"></button>
  <button id="btn-upload"></button>
  <input type="file" id="file-input" accept=".gltf,.glb,.obj">
  <button id="btn-perf"></button>
</div>



<!-- CULLING BREAKDOWN (bottom-left — offset for left panel toggle) -->
<div id="cull-breakdown">
    <div class="cull-title">Culling Breakdown</div>

    <div class="cull-row">
        <span><span class="cull-dot" style="background:#00c8ff"></span>Distance + Frustum</span>
        <span class="cull-val" id="stat-cF">0</span>
    </div>
    <div class="cull-row">
        <span><span class="cull-dot" style="background:#7b2fff"></span>Occlusion</span>
        <span class="cull-val" id="stat-cO">0</span>
    </div>
    <div class="cull-row">
        <span><span class="cull-dot" style="background:#ffe033"></span>LOD (distance)</span>
        <span class="cull-val" id="stat-cL">0</span>
    </div>
</div>

<!-- CONTROLS HINT (bottom-right) -->
<div id="controls-hint">
    <span class="hint-key">W A S D</span> Move &nbsp;
    <span class="hint-key">Q / E</span> Up/Down<br>
    <span class="hint-key">←→↑↓</span> Look &nbsp;
    <span class="hint-key">Mouse</span> Click+Drag to look
</div>

<!-- Toast notification -->
<div id="toast"></div>

<!-- Chart.js untuk Performance Dashboard -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
